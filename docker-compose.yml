version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./distillery.db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=development_secret_key_change_in_production
    volumes:
      - ./backend/distillery.db:/app/distillery.db
    depends_on:
      - redis

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
